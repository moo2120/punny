<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pronunciation Trainer 🌟</title>
    <!-- Google Fonts: Poppins (Clean and Modern) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5;       /* Modern Indigo */
            --primary-hover: #4338CA;
            --success: #10B981;       /* Emerald */
            --success-hover: #059669;
            --danger: #EF4444;        /* Rose Alert */
            --danger-hover: #DC2626;
            --dark: #1F2937;          /* Slate Dark */
            --light: #F9FAFB;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F3F4F6;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            transition: var(--transition);
        }

        /* Screen Navigation (Single-Page App Layout) */
        .screen-section {
            display: none;
        }
        .screen-section.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Setup Screen Controls */
        .setup-card {
            background-color: var(--light);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #E5E7EB;
            margin-bottom: 10px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4B5563;
            letter-spacing: 0.5px;
        }

        select {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1.5px solid #D1D5DB;
            font-size: 15px;
            background-color: white;
            font-family: inherit;
            color: var(--dark);
            outline: none;
            transition: var(--transition);
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        /* Practice / Training Screen */
        .trainer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-easy { background-color: #D1FAE5; color: #065F46; }
        .badge-medium { background-color: #FEF3C7; color: #92400E; }
        .badge-hard { background-color: #FEE2E2; color: #991B1B; }

        .progress-indicator {
            text-align: center;
            font-size: 13px;
            color: #9CA3AF;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .card {
            background: var(--light);
            padding: 30px 20px;
            border-radius: 16px;
            border: 1px solid #E5E7EB;
            margin: 15px 0;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #target-sentence {
            font-size: 22px;
            line-height: 1.6;
            font-weight: 600;
            color: var(--dark);
            transition: var(--transition);
        }

        #image-container {
            max-width: 100%;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        #image-display {
            width: 100%;
            max-height: 220px;
            object-fit: contain;
        }

        /* Listen and Speak Audio Controls */
        #audio-container {
            display: none;
            width: 100%;
        }

        .audio-instruction {
            font-size: 13px;
            color: #6B7280;
            margin-bottom: 15px;
        }

        /* Voice Selection Controls inside Audio Card */
        .voice-settings {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.7);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex: 1;
            min-width: 140px;
        }

        .setting-item label {
            font-size: 11px;
            font-weight: 600;
            color: #4B5563;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-item select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1.5px solid #E5E7EB;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark);
            background-color: white;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-audio-play {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
            position: relative;
            /* 🛠️ เพิ่มบรรทัดนี้เพื่อเว้นระยะห่างด้านล่างของปุ่ม (ปรับตัวเลขได้ตามใจชอบ) */
            margin-bottom: 30px; 
        }

        .btn-audio-play:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-audio-play::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50px;
            border: 2px solid var(--primary);
            top: 0;
            left: 0;
            animation: audio-pulse 2s infinite;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes audio-pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.15); opacity: 0; }
        }

        /* Pronunciation feedback markers */
        .word-correct { color: var(--success); font-weight: 700; margin: 0 3px; border-bottom: 2px solid var(--success); }
        .word-incorrect { color: var(--danger); text-decoration: underline dashed; margin: 0 3px; }

        .comparison-result {
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
            min-height: 30px;
            margin: 15px 0;
        }

        .status-text {
            text-align: center;
            font-size: 13px;
            font-style: italic;
            color: #6B7280;
            min-height: 20px;
            margin-bottom: 15px;
        }

        .score-display {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin: 15px 0;
            min-height: 48px;
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
        }

        button {
            font-family: inherit;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        button:disabled {
            background-color: #D1D5DB !important;
            color: #9CA3AF !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        .btn-block {
            width: 100%;
        }

        .btn-large {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }

        .btn-secondary { background: #E5E7EB; color: #4B5563; font-weight: 600; padding: 10px 20px; font-size: 14px; }
        .btn-secondary:hover { background: #D1D5DB; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

        .btn-success { background: var(--success); color: white; }
        .btn-success:hover:not(:disabled) { background: var(--success-hover); }

        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }

        /* Mic Action Settings */
        .btn-mic {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 26px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .btn-mic-active {
            animation: recording-glow 1.5s infinite;
        }

        @keyframes recording-glow {
            0% { background-color: var(--danger); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { background-color: #F87171; box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { background-color: var(--danger); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Practice History Section */
        .history-section {
            max-width: 650px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .history-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 13px;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid #E5E7EB;
        }

        th {
            background-color: var(--light);
            color: #4B5563;
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .history-target {
            font-weight: 600;
            color: var(--dark);
        }

        .history-user {
            color: #6B7280;
            font-size: 12px;
            margin-top: 3px;
        }

        .score-pill {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }
        .score-pill-high { background-color: #D1FAE5; color: #065F46; }
        .score-pill-med { background-color: #FEF3C7; color: #92400E; }
        .score-pill-low { background-color: #FEE2E2; color: #991B1B; }

        /* ==================== Responsive Queries (Desktop/Mobile optimizations) ==================== */
        @media (max-width: 600px) {
            body {
                padding: 15px 10px;
            }

            .container {
                padding: 20px 15px;
                border-radius: 16px;
                margin-bottom: 15px;
            }

            h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 20px;
            }

            .setup-card {
                padding: 15px;
            }

            select {
                padding: 10px 12px;
                font-size: 13px;
            }

            .trainer-header {
                margin-bottom: 15px;
            }

            .progress-indicator {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .card {
                padding: 20px 12px;
                min-height: 100px;
            }

            #target-sentence {
                font-size: 17px;
                line-height: 1.5;
            }

            .voice-settings {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
                width: 100%;
            }

            .setting-item {
                width: 100%;
                min-width: unset;
            }

            .btn-audio-play {
                width: 100%;
                justify-content: center;
                font-size: 14px;
                padding: 10px 18px;
            }

            .comparison-result {
                font-size: 15px;
                margin: 10px 0;
            }

            .status-text {
                font-size: 12px;
                margin-bottom: 10px;
            }

            .score-display {
                font-size: 26px;
                margin: 10px 0;
            }

            /* Stack all main buttons vertically to prevent clipping of button text on mobile */
            .btn-group {
                flex-direction: column;
                width: 100%;
                gap: 10px;
            }

            .btn-group button {
                width: 100% !important;
                padding: 12px;
                font-size: 14px;
                justify-content: center;
            }

            .history-section {
                padding: 15px;
                border-radius: 16px;
            }

            .history-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .history-header h3 {
                font-size: 14px;
            }

            .history-header div {
                width: 100%;
                display: flex;
                gap: 6px;
            }

            .history-header div button {
                flex: 1;
                font-size: 11px;
                padding: 6px 8px;
            }

            table {
                font-size: 11px;
            }

            th, td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== Screen 1: Study Configuration (Setup Screen) ==================== -->
    <div id="screen-setup" class="container screen-section active">
        <h1>Pronunciation App 🌟</h1>
        <p class="subtitle">Train your speaking skills with native audio feedback! (◕‿◕)</p>
        
        <div class="setup-card">
            <div class="filter-group">
                <label for="filter-mode">🎛️ STUDY MODE</label>
                <select id="filter-mode">
                    <option value="read">📖 Read and Speak (See text and repeat)</option>
                    <option value="listen">🎧 Listen and Speak (Listen and mimic voice)</option>
                    <option value="image">🖼️ Look and Speak (Identify pictures)</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-difficulty">🎯 DIFFICULTY LEVEL</label>
                <select id="filter-difficulty">
                    <option value="all">⭐ All Levels</option>
                    <option value="easy">🟢 Easy</option>
                    <option value="medium">🟡 Medium</option>
                    <option value="hard">🔴 Hard</option>
                </select>
            </div>
        </div>

        <button class="btn-primary btn-block btn-large" id="btn-start" onclick="startTrainingSession()" disabled>
            ⌛ Loading database...
        </button>
    </div>

    <!-- ==================== Screen 2: Interactive Training (Trainer Screen) ==================== -->
    <div id="screen-trainer" class="container screen-section">
        <div class="trainer-header">
            <button class="btn-secondary btn-sm" onclick="goBackToSetup()">⚙️ Change Mode</button>
            <span id="difficulty-badge" class="badge">-</span>
        </div>
        
        <div class="progress-indicator">
            Challenge <span id="current-question-num">0</span> / <span id="total-questions-num">0</span>
        </div>

        <!-- Dynamic Challenge Area -->
        <div class="card">
            <!-- Image Card (Look and Speak) -->
            <div id="image-container">
                <img id="image-display" src="" alt="Look at this image">
            </div>
            
            <!-- Audio Controller with Voice Setup (Listen and Speak) -->
            <div id="audio-container">
                <p class="audio-instruction">🔊 Listen carefully and repeat after the speaker! (•◡•)</p>
                
                <div class="voice-settings">
                    <div class="setting-item">
                        <label for="select-voice-type">🗣️ Speaker</label>
                        <select id="select-voice-type" onchange="updateVoiceSettings()">
                            <option value="female" selected>👩 Woman (Normal)</option>
                            <option value="male">👨 Man (Normal)</option>
                            <option value="girl">👧 Girl (High Pitch)</option>
                            <option value="boy">👦 Boy (High Pitch)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="select-voice-speed">⚡ Speed</label>
                        <select id="select-voice-speed" onchange="updateVoiceSettings()">
                            <option value="0.7">🐢 Slow (0.7x)</option>
                            <option value="1.0" selected>🚶 Normal (1.0x)</option>
                            <option value="1.3">🚀 Fast (1.3x)</option>
                        </select>
                    </div>
                </div>

                <button class="btn-audio-play" id="btn-play-audio" onclick="playTargetAudio()">
                    🔊 Listen to me
                </button>
            </div>
            
            <!-- Hidden/Revealed targets -->
            <div id="target-sentence">Loading...</div>
        </div>
        
        <!-- Interactive evaluation -->
        <div id="comparison-result" class="comparison-result"></div>

        <div class="status-text" id="status-message">Ready. Click 'Start Practice' to begin.</div>
        <div class="score-display" id="score-text"></div>

        <div class="btn-group">
            <button class="btn-success btn-mic" id="btn-mic" onclick="toggleRecording()">
                🎙️ Start Practice (•◡•)
            </button>
            <!-- New: Retry/Practice Again Button -->
            <button class="btn-secondary" id="btn-retry" onclick="retryCurrentSentence()" style="display: none;">
                🔄 Practice Again
            </button>
            <button class="btn-secondary" id="btn-next" onclick="loadNextSentence()">
                Next Challenge ➡️
            </button>
        </div>
    </div>

    <!-- ==================== Activity History Panel ==================== -->
    <div id="history-panel" class="history-section" style="display: none;">
        <div class="history-header">
            <h3>📈 Your Practice History</h3>
            <div>
                <button class="btn-secondary btn-sm" onclick="exportHistoryToCSV()">📤 Export CSV</button>
                <button class="btn-danger btn-sm" onclick="clearPracticeHistory()">🗑️ Clear History</button>
            </div>
        </div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%">Time</th>
                        <th style="width: 15%">Mode</th>
                        <th style="width: 45%">Target Sentence & Your Speech</th>
                        <th style="width: 15%">Score</th>
                    </tr>
                </thead>
                <tbody id="history-table-body">
                    <!-- Loaded dynamically via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
