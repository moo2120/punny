<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pronunciation Practice</title>
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h1 { text-align: center; color: var(--primary); margin-top: 0;}
        .card {
            background: #f1f2f6;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            font-size: 20px;
            line-height: 1.5;
        }
        .word-correct { color: var(--success); font-weight: bold; margin: 0 2px; }
        .word-incorrect { color: var(--danger); text-decoration: underline; margin: 0 2px; }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { background: #ccc; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .status-text { text-align: center; font-style: italic; color: #7f8c8d; min-height: 24px;}
        .score-display { text-align: center; font-size: 24px; font-weight: bold; margin: 15px 0; }
        
        /* ประวัติการฝึก */
        .history-section { max-width: 600px; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pronunciation App</h1>
        <div style="text-align: center;">
            <span id="difficulty-badge" style="background: #eccc68; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">Loading...</span>
        </div>
        
        <!-- ประโยคเป้าหมาย -->
        <div class="card" id="target-sentence">Please loading sentences...</div>
        
        <!-- ผลการเปรียบเทียบคำ -->
        <div id="comparison-result" style="text-align: center; font-size: 18px; min-height: 40px; margin-bottom: 15px;"></div>

        <div class="status-text" id="status-message">Press "Start Practice" and say the sentence above.</div>
        <div class="score-display" id="score-text"></div>

        <div class="btn-group">
            <button class="btn-primary" id="btn-next" onclick="loadNextSentence()">Next Sentence</button>
            <button class="btn-success" id="btn-mic" onclick="toggleRecording()">Start Practice</button>
        </div>
    </div>

    <!-- ส่วนของประวัติและปุ่ม Export -->
    <div class="history-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3>Your Practice History</h3>
            <button class="btn-primary" style="padding: 6px 12px; font-size: 12px;" onclick="exportHistoryToCSV()">Export History as CSV</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Sentence</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="history-table-body">
                <!-- ข้อมูลจะถูกเขียนด้วย JS -->
            </tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
