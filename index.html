<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pronunciation Trainer</title>
    <!-- นำเข้า Google Fonts: Poppins (EN) และ Noto Sans Thai (TH) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5;       /* Indigo */
            --primary-hover: #4338CA;
            --success: #10B981;       /* Emerald */
            --success-hover: #059669;
            --danger: #EF4444;        /* Rose */
            --danger-hover: #DC2626;
            --dark: #1F2937;          /* Slate */
            --light: #F9FAFB;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Thai', -apple-system, sans-serif;
            background-color: #F3F4F6;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            transition: var(--transition);
        }

        /* ระบบแบ่งหน้า (Single-Page App Views) */
        .screen-section {
            display: none;
        }
        .screen-section.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* ฟอร์มหน้าแรก (Setup Screen) */
        .setup-card {
            background-color: var(--light);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #E5E7EB;
            margin-bottom: 10px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4B5563;
            letter-spacing: 0.5px;
        }

        select {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1.5px solid #D1D5DB;
            font-size: 15px;
            background-color: white;
            font-family: inherit;
            color: var(--dark);
            outline: none;
            transition: var(--transition);
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        /* หน้าประเมินผลฝึกฝน (Trainer Screen) */
        .trainer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-easy { background-color: #D1FAE5; color: #065F46; }
        .badge-medium { background-color: #FEF3C7; color: #92400E; }
        .badge-hard { background-color: #FEE2E2; color: #991B1B; }

        .progress-indicator {
            text-align: center;
            font-size: 13px;
            color: #9CA3AF;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .card {
            background: var(--light);
            padding: 30px 20px;
            border-radius: 16px;
            border: 1px solid #E5E7EB;
            margin: 15px 0;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #target-sentence {
            font-size: 22px;
            line-height: 1.6;
            font-weight: 600;
            color: var(--dark);
            transition: var(--transition);
        }

        /* เอฟเฟกต์เบลอโหมดฟังแล้วพูด */
        .text-blurred {
            filter: blur(6px);
            user-select: none;
            pointer-events: none;
        }

        #image-container {
            max-width: 100%;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        #image-display {
            width: 100%;
            max-height: 220px;
            object-fit: contain;
        }

        /* ปุ่มและตัวครอบโหมด Listen and Speak */
        #audio-container {
            display: none;
            width: 100%;
        }

        .audio-instruction {
            font-size: 13px;
            color: #6B7280;
            margin-bottom: 12px;
        }

        .btn-audio-play {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
            position: relative;
        }

        .btn-audio-play:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* เอฟเฟกต์คลื่นสัญญาณวิทยุกระจายขณะรอบรับการเล่น */
        .btn-audio-play::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50px;
            border: 2px solid var(--primary);
            top: 0;
            left: 0;
            animation: audio-pulse 2s infinite;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes audio-pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.15); opacity: 0; }
        }

        /* ตัวแสดงคำและคะแนน */
        .word-correct { color: var(--success); font-weight: 700; margin: 0 3px; border-bottom: 2px solid var(--success); }
        .word-incorrect { color: var(--danger); text-decoration: underline dashed; margin: 0 3px; }

        .comparison-result {
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
            min-height: 30px;
            margin: 15px 0;
        }

        .status-text {
            text-align: center;
            font-size: 13px;
            font-style: italic;
            color: #6B7280;
            min-height: 20px;
            margin-bottom: 15px;
        }

        .score-display {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin: 15px 0;
            min-height: 48px;
        }

        /* ปุ่มหลักด้านล่าง */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        button {
            font-family: inherit;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-block {
            width: 100%;
        }

        .btn-large {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
        .btn-primary:disabled { background: #D1D5DB; cursor: not-allowed; }

        .btn-secondary { background: #E5E7EB; color: #4B5563; font-weight: 600; padding: 10px 20px; font-size: 14px; }
        .btn-secondary:hover { background: #D1D5DB; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

        .btn-success { background: var(--success); color: white; }
        .btn-success:hover:not(:disabled) { background: var(--success-hover); }

        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }

        /* ปุ่มบันทึกเสียงขนาดใหญ่ */
        .btn-mic {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 26px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* สัญญาณไฟกะพริบขณะพูด */
        .btn-mic-active {
            animation: recording-glow 1.5s infinite;
        }

        @keyframes recording-glow {
            0% { background-color: var(--danger); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { background-color: #F87171; box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { background-color: var(--danger); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* ส่วนของตารางประวัติ */
        .history-section {
            max-width: 650px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .history-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 13px;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid #E5E7EB;
        }

        th {
            background-color: var(--light);
            color: #4B5563;
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .history-target {
            font-weight: 600;
            color: var(--dark);
        }

        .history-user {
            color: #6B7280;
            font-size: 12px;
            margin-top: 3px;
        }

        .score-pill {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }
        .score-pill-high { background-color: #D1FAE5; color: #065F46; }
        .score-pill-med { background-color: #FEF3C7; color: #92400E; }
        .score-pill-low { background-color: #FEE2E2; color: #991B1B; }
    </style>
</head>
<body>

    <!-- ==================== หน้า 1: เลือกโหมด (Setup Screen) ==================== -->
    <div id="screen-setup" class="container screen-section active">
        <h1>Pronunciation App</h1>
        <p class="subtitle">เลือกโหมดและความยาก เพื่อเริ่มต้นฝึกฝนออกเสียงภาษาอังกฤษ</p>
        
        <div class="setup-card">
            <div class="filter-group">
                <label for="filter-mode">🎛️ MODE (โหมดการฝึก)</label>
                <select id="filter-mode">
                    <option value="read">Read and Speak (อ่านแล้วพูด)</option>
                    <option value="listen">Listen and Speak (ฟังแล้วพูด)</option>
                    <option value="image">Look and Speak (ดูภาพแล้วพูด)</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-difficulty">🎯 DIFFICULTY (ระดับความยาก)</label>
                <select id="filter-difficulty">
                    <option value="all">All Levels (ทุกระดับ)</option>
                    <option value="easy">Easy (ระดับง่าย)</option>
                    <option value="medium">Medium (ระดับปานกลาง)</option>
                    <option value="hard">Hard (ระดับยาก)</option>
                </select>
            </div>
        </div>

        <button class="btn-primary btn-block btn-large" id="btn-start" onclick="startTrainingSession()" disabled>
            ⌛ Loading database...
        </button>
    </div>

    <!-- ==================== หน้า 2: หน้าการฝึกฝน (Trainer Screen) ==================== -->
    <div id="screen-trainer" class="container screen-section">
        <div class="trainer-header">
            <button class="btn-secondary btn-sm" onclick="goBackToSetup()">⚙️ Change Settings</button>
            <span id="difficulty-badge" class="badge">-</span>
        </div>
        
        <div class="progress-indicator">
            Question <span id="current-question-num">0</span> / <span id="total-questions-num">0</span>
        </div>

        <!-- หน้าต่างแสดงผลข้อความตามโหมด -->
        <div class="card">
            <!-- แสดงรูปภาพสำหรับโหมด (Look and Speak) -->
            <div id="image-container">
                <img id="image-display" src="" alt="Look at this image">
            </div>
            
            <!-- ปุ่มเล่นเสียงสำหรับโหมด (Listen and Speak) -->
            <div id="audio-container">
                <p class="audio-instruction">คลิกที่ปุ่มด้านล่างเพื่อฟังต้นฉบับสำเนียงอเมริกัน</p>
                <button class="btn-audio-play" id="btn-play-audio" onclick="playTargetAudio()">
                    🔊 Hear Pronunciation
                </button>
            </div>
            
            <!-- ข้อความเฉลย/เป้าหมาย -->
            <div id="target-sentence">Loading...</div>
        </div>
        
        <!-- ส่วนแสดงเปรียบเทียบคำพูดทีละพยางค์ -->
        <div id="comparison-result" class="comparison-result"></div>

        <div class="status-text" id="status-message">Ready. Click 'Start Practice' to begin.</div>
        <div class="score-display" id="score-text"></div>

        <div class="btn-group">
            <button class="btn-secondary" id="btn-next" onclick="loadNextSentence()">Next Question ➡️</button>
            <button class="btn-success btn-mic" id="btn-mic" onclick="toggleRecording()">
                🎙️ Start Practice
            </button>
        </div>
    </div>

    <!-- ==================== ตารางประวัติ (มีผลรวมเก็บประวัติจาก LocalStorage) ==================== -->
    <div id="history-panel" class="history-section" style="display: none;">
        <div class="history-header">
            <h3>Your Practice History</h3>
            <button class="btn-secondary btn-sm" onclick="exportHistoryToCSV()">📤 Export History (CSV)</button>
        </div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%">Time</th>
                        <th style="width: 15%">Mode</th>
                        <th style="width: 45%">Target Sentence & Your Voice</th>
                        <th style="width: 15%">Score</th>
                    </tr>
                </thead>
                <tbody id="history-table-body">
                    <!-- ประวัติจะเขียนขึ้นมาผ่าน JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
